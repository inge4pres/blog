<header class="site-header">
  <div class="container site-header__inner">
    <a href="{{ .Site.BaseURL }}" class="site-header__brand">
      <span class="site-header__title">{{- .Site.Title -}}</span>
    </a>

    <nav class="site-nav" aria-label="Main navigation">
      {{ range .Site.Menus.main }}
        {{- if .HasChildren }}
          <div class="site-nav__dropdown">
            <button class="site-nav__link site-nav__dropdown-trigger"
                    onclick="this.parentElement.classList.toggle('open'); event.stopPropagation();"
                    aria-haspopup="true">
              {{- .Name -}}
            </button>
            <div class="site-nav__dropdown-menu">
              {{ range .Children }}
                <a href="{{ .URL }}" class="site-nav__link site-nav__link--child"
                  {{ if strings.HasPrefix .URL "http" }}target="_blank" rel="noopener"{{ end }}>
                  {{- .Name -}}
                </a>
              {{ end }}
            </div>
          </div>
        {{- else }}
          <a href="{{ .URL }}" class="site-nav__link
            {{- if eq $.RelPermalink .URL }} site-nav__link--active{{ end }}"
            {{ if strings.HasPrefix .URL "http" }}target="_blank" rel="noopener"{{ end }}>
            {{- .Name -}}
          </a>
        {{- end }}
      {{ end }}
    </nav>

    <button class="theme-toggle" aria-label="Toggle light/dark mode" onclick="
      var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('signal-theme', t);
    ">
      <svg class="theme-toggle__sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="theme-toggle__moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</header>
<script>
  document.addEventListener('click', function() {
    document.querySelectorAll('.site-nav__dropdown.open').forEach(function(el) {
      el.classList.remove('open');
    });
  });
</script>
